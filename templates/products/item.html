{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ item.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h1 class="h3 mb-3">{{ item.name }}</h1>
            <p class="text-muted">{{ item.description|linebreaksbr }}</p>
            <p class="fs-4 fw-semibold mb-4">
              {{ item.price }} {{ item.currency }} <small class="text-muted fs-6">(minor units)</small>
            </p>
            <button type="button" id="buy-btn" class="btn btn-primary btn-lg w-100">Купить</button>
            <p class="small text-danger mt-3 d-none" id="buy-error"></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://js.stripe.com/v3/"></script>
  <script src="{% static 'js/stripe-checkout.js' %}"></script>
  <script>
    window.OPLATI_CONFIG = {
      itemId: {{ item.pk }},
      publishableKey: "{{ stripe_publishable_key|escapejs }}"
    };
  </script>
</body>
</html>
