<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Shop</span>
    </div>
  </nav>

  <div class="container pb-5">
    <h1 class="h2 mb-4">Товары</h1>
    {% if items %}
      <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
        {% for item in items %}
          <div class="col">
            <div class="card h-100 shadow-sm">
              <div class="card-body d-flex flex-column">
                <h2 class="card-title h5">{{ item.name }}</h2>
                <p class="card-text text-muted small flex-grow-1">{{ item.description|truncatewords:28 }}</p>
                <p class="fw-semibold mb-3">
                  {{ item.get_price_display }} {{ item.currency }}
                </p>
                <a href="{% url 'item-detail' item.pk %}" class="btn btn-primary mt-auto">Купить</a>
              </div>
            </div>
          </div>
        {% endfor %}
      </div>
    {% else %}
      <p class="text-muted">Нет товаров.</p>
    {% endif %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
