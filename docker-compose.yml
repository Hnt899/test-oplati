services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oplati
      POSTGRES_USER: oplati
      POSTGRES_PASSWORD: oplati
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oplati -d oplati"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://oplati:oplati@db:5432/oplati
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web,0.0.0.0,*.onrender.com"
      SITE_URL: http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  pgdata:
